    <path d="M354 224H198c-5 0-10-4-10-9c0-4 4-8 9-8h83l-33 66h107l31-49z" fill="url(#orangeGrad)"/>
    <path d="M180 78C104 78 43 139 43 215c0 35 13 67 35 91C65 284 58 259 58 233c0-76 61-137 137-137h110l8-18z" fill="#FFFFFF" opacity="0.20"/>
